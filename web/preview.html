<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRP Cards — Pi Display Preview</title>
  <style>
    :root {
      --hand: #0072B2;
      --shoulder: #E69F00;
      --arm: #009E73;
      --leg: #CC79A7;
      --ink: #111;
      --muted: #666;
      --rule: #505050;
      --bg: #f4f4f4;
      --panel: #fff;
      --border: #dcdcdc;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 16px 24px; background: #fff; border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 20px; letter-spacing: -0.01em; }
    header .sub { color: var(--muted); font-size: 14px; }
    header nav a { color: var(--muted); text-decoration: none; font-size: 14px; margin-left: 12px; }
    header nav a:hover { color: var(--ink); }

    main {
      max-width: 1400px; margin: 24px auto; padding: 0 24px;
      display: grid; grid-template-columns: 320px 1fr; gap: 24px;
    }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

    .panel {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .field select, .field input {
      border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
      font: inherit; background: #fff;
    }
    .field select:focus, .field input:focus { outline: 2px solid #aab7ff; outline-offset: -1px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .hint { font-size: 12px; color: var(--muted); margin-top: -6px; margin-bottom: 14px; }

    .actions { display: flex; gap: 8px; margin-top: 4px; }
    button {
      appearance: none; border: 1px solid var(--border); background: #fff; color: var(--ink);
      padding: 8px 12px; border-radius: 6px; font: inherit; cursor: pointer;
    }
    button.primary { background: #111; color: #fff; border-color: #111; }
    button:hover { filter: brightness(0.95); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .preview {
      background: #000; border-radius: 10px; padding: 8px; border: 1px solid var(--border);
    }

    .screen {
      aspect-ratio: 16 / 9; width: 100%; background: #fff; border-radius: 6px;
      display: grid; grid-template-rows: 1fr 10fr; overflow: hidden; position: relative;
    }

    .banner {
      display: grid; place-items: center;
      border-bottom: 2px solid var(--rule);
      font-weight: 800;
      letter-spacing: 0.06em;
      font-size: clamp(18px, 3vw, 38px);
    }

    .card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto 1fr auto;
      gap: 12px 18px;
      padding: 4% 4% 3% 4%;
      position: relative;
    }

    .icon-cell { grid-row: 1; grid-column: 1; }
    .title-cell { grid-row: 1; grid-column: 2; }
    .goal-cell { grid-row: 1; grid-column: 3; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .steps-cell { grid-row: 2; grid-column: 1 / -1; align-self: start; }
    .footer-cell { grid-row: 3; grid-column: 1 / -1; align-self: end; }

    .icon-wrap {
      position: relative;
      width: clamp(60px, 12vw, 160px);
      height: clamp(60px, 12vw, 160px);
    }
    .icon-wrap svg { width: 100%; height: 100%; display: block; }
    .icon-num {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      color: #fff; font-weight: 900;
      font-size: clamp(26px, 5.5vw, 72px);
    }

    .category {
      font-weight: 800; letter-spacing: -0.005em; line-height: 1;
      font-size: clamp(22px, 3.8vw, 54px);
    }
    .exercise-name {
      font-weight: 800; color: var(--ink); margin-top: 10px;
      font-size: clamp(16px, 2.4vw, 30px);
    }

    .goal-label { font-weight: 900; font-size: clamp(16px, 2.6vw, 36px); letter-spacing: 0.04em; }
    .goal-box {
      width: clamp(50px, 8vw, 110px); height: clamp(50px, 8vw, 110px);
      border: 5px solid currentColor; border-radius: 4px; background: #fff;
    }

    .steps {
      list-style: none; margin: 0; padding: 0;
      display: grid; row-gap: 6px;
      font-size: clamp(16px, 2.6vw, 34px);
      font-weight: 500; color: var(--ink);
    }
    .steps li { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .footer {
      font-weight: 900; letter-spacing: 0.02em;
      font-size: clamp(16px, 2.6vw, 34px);
    }

    .patient-label {
      position: absolute; left: 10px; bottom: 6px;
      font-size: 12px; color: #bbb; letter-spacing: 0.15em; font-weight: 700;
    }

    /* category colours */
    .c-hand     { --category-color: var(--hand); }
    .c-shoulder { --category-color: var(--shoulder); }
    .c-arm      { --category-color: var(--arm); }
    .c-leg      { --category-color: var(--leg); }
    .category, .goal-label, .footer, .goal-cell { color: var(--category-color); }

    .status {
      margin-top: 12px; font-size: 13px; color: var(--muted);
      display: flex; justify-content: space-between;
    }
    .status .dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; margin-right: 6px; vertical-align: 1px;
    }

    .export { margin-top: 14px; }
    textarea {
      width: 100%; min-height: 110px; border: 1px solid var(--border); border-radius: 6px;
      padding: 10px; font: 13px/1.4 ui-monospace, Menlo, Consolas, monospace; resize: vertical;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Pi Display Preview</h1>
      <div class="sub">Live preview of what the Raspberry Pi Zero 2W will show</div>
    </div>
    <nav>
      <a href="index.html">Caregiver tool</a>
      <a href="https://github.com/bayanimills/Stroke-Recovery-Program-Cards" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </header>

  <main>
    <section class="panel" aria-label="Program controls">
      <div class="field">
        <label for="patient">Patient</label>
        <input id="patient" type="text" placeholder="e.g. Jim" autocomplete="off" />
      </div>

      <div class="field">
        <label for="dwell">Dwell (minutes per card)</label>
        <select id="dwell">
          <option value="15">15</option>
          <option value="30" selected>30</option>
          <option value="45">45</option>
          <option value="60">60</option>
          <option value="75">75</option>
          <option value="90">90</option>
        </select>
        <div class="hint">On the Pi. Preview below cycles faster so you can see all four.</div>
      </div>

      <div class="field">
        <label for="pos-hand">Hand exercise (★ 1)</label>
        <select id="pos-hand" data-category="hand"></select>
      </div>
      <div class="field">
        <label for="pos-shoulder">Shoulder exercise (● 2)</label>
        <select id="pos-shoulder" data-category="shoulder"></select>
      </div>
      <div class="field">
        <label for="pos-arm">Arm exercise (■ 3)</label>
        <select id="pos-arm" data-category="arm"></select>
      </div>
      <div class="field">
        <label for="pos-leg">Leg exercise (▲ 4)</label>
        <select id="pos-leg" data-category="leg"></select>
      </div>

      <div class="field">
        <label for="speed">Preview speed</label>
        <select id="speed">
          <option value="1.5">Fast (1.5s per card)</option>
          <option value="4" selected>Medium (4s per card)</option>
          <option value="real">Real-time (use dwell)</option>
          <option value="pause">Paused</option>
        </select>
      </div>

      <div class="export">
        <label class="field" for="json-out" style="margin-bottom: 6px;">
          <span>Copy this to <code>/etc/srp/program.json</code> on the Pi</span>
        </label>
        <textarea id="json-out" readonly></textarea>
        <div class="actions" style="margin-top: 10px;">
          <button id="copy-btn" class="primary" type="button">Copy to clipboard</button>
          <button id="download-btn" type="button">Download program.json</button>
        </div>
      </div>
    </section>

    <section class="panel" aria-label="Display preview">
      <div class="preview">
        <div class="screen" id="screen">
          <div class="banner" id="banner">TUE, 21 APR</div>
          <div class="card c-hand" id="card">
            <div class="icon-cell">
              <div class="icon-wrap" id="icon-wrap"></div>
            </div>
            <div class="title-cell">
              <div class="category" id="category">HAND EXERCISES</div>
              <div class="exercise-name" id="exercise-name">STRESS BALL SQUEEZE</div>
            </div>
            <div class="goal-cell">
              <div class="goal-label">GOAL</div>
              <div class="goal-box"></div>
            </div>
            <div class="steps-cell">
              <ul class="steps" id="steps"></ul>
            </div>
            <div class="footer-cell">
              <div class="footer">REPEAT until GOAL</div>
            </div>
            <div class="patient-label" id="patient-label"></div>
          </div>
        </div>
      </div>
      <div class="status">
        <div><span class="dot"></span>Live preview — controls above update this screen</div>
        <div id="cursor-info"></div>
      </div>
    </section>
  </main>

  <script>
    // Mirror of srp/exercises.py — keep these in sync when adding exercises.
    const EXERCISES = {
      hand: {
        hex: '#0072B2', shape: 'star', num: 1, title: 'HAND EXERCISES',
        exercises: [
          { name: 'STRESS BALL SQUEEZE', steps: ['1. Hold ball in right hand', '2. Squeeze firmly (count to 3)', '3. Slowly Release'] },
          { name: 'FINGER PINCHES',      steps: ['1. Pinch with thumb & each finger', '2. Hold each for 5 seconds'] },
          { name: 'WATER BOTTLE SQUEEZE',steps: ['1. Hold 300ml water bottle', '2. Squeeze as hard as you can', '3. Slowly Release'] }
        ]
      },
      shoulder: {
        hex: '#E69F00', shape: 'circle', num: 2, title: 'SHOULDER EXERCISES',
        exercises: [
          { name: 'GENTLE ARM LIFT',  steps: ['1. Extend arm outwards', '2. Elevate to 45 degrees', '3. Hold in place', '4. Lower slowly'] },
          { name: 'CLASPED HANDS',    steps: ['1. Clasp hands together', '2. Slowly Raise to ceiling', '3. Hold in place for 10 seconds', '4. Slowly Lower Arms'] },
          { name: 'SHOULDER CIRCLES', steps: ['1. Small circular motions', '2. Forward 5 circles', '3. Backward 5 circles', '4. Keep movements slow'] }
        ]
      },
      arm: {
        hex: '#009E73', shape: 'square', num: 3, title: 'ARM EXERCISES',
        exercises: [
          { name: 'NOSE TOUCH',        steps: ['1. Extend arm out at 45 degrees', '2. Touch nose', '3. Extend straight back out'] },
          { name: 'ELBOW BEND',        steps: ['1. Bend elbow to 90°', '2. Hold 2 seconds', '3. Straighten slowly'] },
          { name: 'WATER BOTTLE HOLD', steps: ['1. Hold 300ml bottle', '2. Elevate to 30°', '3. Hold in place for 10', '4. Slowly Lower'] }
        ]
      },
      leg: {
        hex: '#CC79A7', shape: 'triangle', num: 4, title: 'LEG EXERCISES',
        exercises: [
          { name: 'KNEE TO CHEST LIFT',           steps: ['1. Lift knee as high as you can', '2. Hold for 2 seconds', '3. Slowly Lower Leg'] },
          { name: 'SEATED LEG RAISE',             steps: ['1. Sit in chair with support', '2. Extend leg straight', '3. Hold in place', '4. Lower slowly'] },
          { name: 'LEG UP WITH TOES UP AND DOWN', steps: ['1. Lay down on your back', '2. Lift leg up', '3. Move toes up and down', '4. Lower leg slowly'] }
        ]
      }
    };

    const CATEGORIES = ['hand', 'shoulder', 'arm', 'leg'];

    // SVG icon builders — colour from currentColor, stroked in black for PDF/Pi parity.
    function svgForShape(shape) {
      const stroke = 'black', strokeW = 4;
      if (shape === 'circle') {
        return `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="currentColor" stroke="${stroke}" stroke-width="${strokeW}"/></svg>`;
      }
      if (shape === 'square') {
        return `<svg viewBox="0 0 100 100"><rect x="8" y="8" width="84" height="84" fill="currentColor" stroke="${stroke}" stroke-width="${strokeW}"/></svg>`;
      }
      if (shape === 'triangle') {
        return `<svg viewBox="0 0 100 100"><polygon points="50,5 95,95 5,95" fill="currentColor" stroke="${stroke}" stroke-width="${strokeW}" stroke-linejoin="round"/></svg>`;
      }
      if (shape === 'star') {
        const pts = [];
        for (let i = 0; i < 10; i++) {
          const r = (i % 2 === 0) ? 45 : 22;
          const a = -Math.PI / 2 + (i * Math.PI / 5);
          pts.push(`${50 + r * Math.cos(a)},${50 + r * Math.sin(a)}`);
        }
        return `<svg viewBox="0 0 100 100"><polygon points="${pts.join(' ')}" fill="currentColor" stroke="${stroke}" stroke-width="${strokeW}" stroke-linejoin="round"/></svg>`;
      }
      return '';
    }

    // Populate the category selects with their 3 exercises
    CATEGORIES.forEach(cat => {
      const sel = document.getElementById(`pos-${cat}`);
      EXERCISES[cat].exercises.forEach((ex, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = ex.name;
        sel.appendChild(opt);
      });
      sel.selectedIndex = Math.min(1, EXERCISES[cat].exercises.length - 1); // Matches README example
    });

    // Default program (matches config/program.example.json)
    document.getElementById('pos-hand').value = 0;
    document.getElementById('pos-shoulder').value = 1;
    document.getElementById('pos-arm').value = 2;
    document.getElementById('pos-leg').value = 0;

    const els = {
      banner: document.getElementById('banner'),
      card: document.getElementById('card'),
      iconWrap: document.getElementById('icon-wrap'),
      iconNum: null,
      category: document.getElementById('category'),
      exerciseName: document.getElementById('exercise-name'),
      steps: document.getElementById('steps'),
      patientLabel: document.getElementById('patient-label'),
      patient: document.getElementById('patient'),
      dwell: document.getElementById('dwell'),
      speed: document.getElementById('speed'),
      jsonOut: document.getElementById('json-out'),
      copyBtn: document.getElementById('copy-btn'),
      downloadBtn: document.getElementById('download-btn'),
    };

    function currentProgram() {
      return [
        `hand_${els.card.dataset.hand ?? document.getElementById('pos-hand').value}`,
        `shoulder_${document.getElementById('pos-shoulder').value}`,
        `arm_${document.getElementById('pos-arm').value}`,
        `leg_${document.getElementById('pos-leg').value}`,
      ].map((p, i) => {
        const cat = CATEGORIES[i];
        const idx = parseInt(document.getElementById(`pos-${cat}`).value, 10);
        return `${cat}_${idx}`;
      });
    }

    function renderBanner() {
      const now = new Date();
      // "DDD, DD MMM" — UK-style day before month. toLocaleDateString gives consistency across locales when we pick pieces.
      const weekday = now.toLocaleDateString('en-GB', { weekday: 'short' }).toUpperCase();
      const day = String(now.getDate()).padStart(2, '0');
      const month = now.toLocaleDateString('en-GB', { month: 'short' }).toUpperCase();
      els.banner.textContent = `${weekday}, ${day} ${month}`;
    }

    function renderCard(category, exerciseIdx) {
      const data = EXERCISES[category];
      const exercise = data.exercises[Math.min(exerciseIdx, data.exercises.length - 1)];

      // Swap category colour class
      els.card.classList.remove('c-hand', 'c-shoulder', 'c-arm', 'c-leg');
      els.card.classList.add(`c-${category}`);

      // Icon: SVG + centred number
      els.iconWrap.innerHTML = `
        <div style="color: ${data.hex}; width: 100%; height: 100%;">${svgForShape(data.shape)}</div>
        <div class="icon-num">${data.num}</div>
      `;

      els.category.textContent = data.title;
      els.exerciseName.textContent = exercise.name;

      els.steps.innerHTML = '';
      exercise.steps.forEach(step => {
        const li = document.createElement('li');
        li.textContent = step;
        els.steps.appendChild(li);
      });

      els.patientLabel.textContent = (els.patient.value || '').toUpperCase();
    }

    function exportJson() {
      const program = currentProgram();
      const config = {
        patient: els.patient.value || '',
        dwell_minutes: parseInt(els.dwell.value, 10),
        program,
      };
      els.jsonOut.value = JSON.stringify(config, null, 2);
    }

    let cycleIdx = 0;
    let cycleTimer = null;

    function advance() {
      const program = currentProgram();
      cycleIdx = (cycleIdx + 1) % program.length;
      const [cat, idx] = program[cycleIdx].split('_');
      renderCard(cat, parseInt(idx, 10));
    }

    function restartCycle() {
      if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
      const speed = els.speed.value;
      const program = currentProgram();
      const [cat, idx] = program[cycleIdx].split('_');
      renderCard(cat, parseInt(idx, 10));
      if (speed === 'pause') return;
      const ms = speed === 'real'
        ? parseInt(els.dwell.value, 10) * 60 * 1000
        : Math.round(parseFloat(speed) * 1000);
      cycleTimer = setInterval(advance, ms);
    }

    // Wire up controls
    ['change', 'input'].forEach(evt => {
      document.querySelectorAll('select, input').forEach(el => {
        el.addEventListener(evt, () => {
          cycleIdx = 0;
          exportJson();
          restartCycle();
        });
      });
    });

    els.copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(els.jsonOut.value);
        els.copyBtn.textContent = 'Copied!';
        setTimeout(() => { els.copyBtn.textContent = 'Copy to clipboard'; }, 1500);
      } catch {
        els.jsonOut.select();
        document.execCommand('copy');
      }
    });

    els.downloadBtn.addEventListener('click', () => {
      const blob = new Blob([els.jsonOut.value + '\n'], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'program.json';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    });

    // First paint
    renderBanner();
    setInterval(renderBanner, 60_000); // keep date correct across midnight
    cycleIdx = 0;
    exportJson();
    restartCycle();
  </script>
</body>
</html>
